name: Auto create PRs when Pushing

on:
  push:
    branches:
      - feature/*
jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Setup GitHub CLI
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install jq
        run: sudo apt-get install jq

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create Pull Request
        run: gh pr create -a @me -B main --title 'Automatic PR creation to merge into main' --body 'Created an automatic Pull Request using Github CLI'
        env:
            GITHUB_TOKEN: ${{ secrets.TOKEN }}
      
      - name: Merge PR
        run: gh pr merge --auto
        env:
            GITHUB_TOKEN: ${{ secrets.TOKEN }}
