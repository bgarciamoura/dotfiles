name: Auto create PRs when Pushing

on:
  push:
    branches:
      - feature/*
jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create Pull Request
        run: gh pr create -a @me -B main --title 'Automatic PR creation to merge into main' --body 'Created an automatic Pull Request using Github CLI'
        env:
            GITHUB_TOKEN: ${{ secrets.TOKEN }}
      
      - name: Merge Pull Request
        run:  |
          pr_url=$(gh pr list --json url | jq -r '.[].url')
          pr_number=$(echo $pr_url | cut -d'/' -f 7)
          gh pr merge $pr_number --auto       
        env:
            GITHUB_TOKEN: ${{ secrets.TOKEN }}
