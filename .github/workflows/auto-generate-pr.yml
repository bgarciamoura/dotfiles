name: Auto create PRs when Pushing

on:
  push:
    branches:
      - feature/*
jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create Pull Request
        run: gh pr create -B main --title 'Merge Develop into Main' --body 'Created automatic Pull Request by Github action.'
        env:
            GITHUB_TOKEN: ${{ secrets.TOKEN }}
